name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -f DevOpsDashboard/Dockerfile -t devops-dashboard ./DevOpsDashboard

    - name: Tag Docker Image
      run: |
        docker tag devops-dashboard:latest 283236068659.dkr.ecr.ap-south-1.amazonaws.com/devops-dashboard:latest

    - name: Push Docker Image
      run: |
        docker push 283236068659.dkr.ecr.ap-south-1.amazonaws.com/devops-dashboard:latest